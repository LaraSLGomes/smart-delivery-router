<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Delivery Router - Logística Urbana</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>
    <div id="painel-controle">
        <div class="cabecalho">
            <h2>Smart Delivery Router</h2>
            <p>Otimização de rotas de entrega e análise do bairro Presidente Kennedy.</p>
        </div>

        <div id="status-banner" class="status-banner hidden"></div>
        <hr>
        
        <div class="campo-busca">
            <label>Ponto de Origem</label>
            <select id="select-origem"><option value="">Carregando...</option></select>
        </div>

        <div class="campo-busca">
            <label>Destino</label>
            <select id="select-destino"><option value="">Carregando...</option></select>
        </div>

        <div class="campo-busca">
            <label>Raio (BFS)</label>
            <input id="input-limite" type="number" min="1" max="10" value="3" />
        </div>

        <div class="botoes-grupo">
            <button id="btn-calcular">Calcular Rota</button>
            <button id="btn-bfs">Mapear Cobertura</button>
            <button id="btn-analises">Ver Análises</button>
            <button id="btn-limpar">Limpar Mapa</button>
        </div>

        <div id="analises-panel" class="analises-panel" style="display:none;"></div>
        <div id="resultado" style="display:none;"></div>
    </div>
    <div id="mapa-container"></div>

    <script src="app.js"></script>
</body>
</html>
